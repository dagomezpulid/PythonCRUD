{% extends 'layouts/base.html' %}

{% block content %}
  <h1>Task Detail</h1>
  {{ error }}
  {{ task.title }}
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button>Actualizar</button>
  </form>
  <form action="{% url 'complete_task' task.id %}" method="POST">
    {% csrf_token %}
    <button>Complete</button>
  </form>

  <form action="{% url 'complete_task' task.id %}" method="POST">
    {% csrf_token %}
    <button>Delete</button>
  </form>
{% endblock %}
